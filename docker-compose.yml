services:
  # ── Astro SSR ────────────────────────────────────────────────────
  astro:
    build:
      context: .
      dockerfile: Dockerfile
    image: petalosmary:latest
    container_name: petalosmary_web
    environment:
      HOST: 0.0.0.0
      PORT: 4321
    ports:
      - "4321:4321"
    # Mount images folder so you can add photos without rebuilding
    volumes:
      - ./public/images:/app/dist/client/images
    networks:
      - proxy-net
      - ngicode-net
    restart: unless-stopped

networks:
  proxy-net:
    external: true
  ngicode-net:
    external: true
    name: mi-web_web-net
